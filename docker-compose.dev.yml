services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      APP_DATA_DIR: /home/app/.vlog-editor
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      LOG_LEVEL: INFO
    volumes:
      - .:/app
      - ${HOME}/.vlog-editor:/home/app/.vlog-editor
    command: >
      python -m uvicorn src.server.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3); sys.exit(0)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
