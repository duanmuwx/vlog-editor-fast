appId: com.openai.vlog-editor-fast
productName: Vlog Editor Fast
files:
  - dist/**
  - dist-electron/**
extraResources:
  - from: backend-runtime/app
    to: backend-runtime/app
    filter:
      - "**/*"
  - from: backend-runtime/venv
    to: backend-runtime/venv
    filter:
      - "**/*"
directories:
  output: release
mac:
  target:
    - dir
linux:
  target:
    - dir
